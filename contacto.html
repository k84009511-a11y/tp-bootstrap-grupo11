<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto-Turismo Formosa</title>
    <link rel="stylesheet" href="contacto.html">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min." rel="stylesheet">
</head>
<body>
<header>
   

</header>


<main>
    <!--Es la bienvinida con el título y la descripción-->
<main>
    <section class="contacto-hero">
        <div class="container">
            <h1><i class="bi bi-geo-alt-fill me-2"></i>Contactanos</h1>
            <p class="mb-0">¿Tenés dudas sobre tu próximo destino en Formosa? Estamos para ayudarte.</p>
        </div>
    </section>
    <!-- cards. estan las 4 tarjetas con los datos de contacto (componentes booststrap cards) -->
    <section class="py-5">
      <div class="container">
        <div class="row g-4 justify-content-center">

          <!-- Tarjeta Teléfono -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card card-dato h-100 text-center p-4">
              <div class="icono mb-3"><i class="bi bi-telephone-fill"></i></div>
              <h5 class="card-title">Teléfono</h5>
              <p class="card-text">(0370) 487 824<br>(0370) 488 452</p>
            </div>
          </div>

          <!-- Tarjeta Email -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card card-dato h-100 text-center p-4">
              <div class="icono mb-3"><i class="bi bi-envelope-fill"></i></div>
              <h5 class="card-title">Correo electrónico</h5>
              <p class="card-text">turismo@formosa.gob.ar</p>
            </div>
          </div>

          <!-- Tarjeta Dirección -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card card-dato h-100 text-center p-4">
              <div class="icono mb-3"><i class="bi bi-building"></i></div>
              <h5 class="card-title">Dirección</h5>
              <p class="card-text">Av. 25 de Mayo 536<br>Formosa Capital, Argentina</p>
            </div>
          </div>

          <!-- Tarjeta WhatsApp -->
          <div class="col-12 col-sm-6 col-lg-3">
            <div class="card card-dato h-100 text-center p-4">
              <div class="icono mb-3"><i class="bi bi-whatsapp"></i></div>
              <h5 class="card-title">WhatsApp</h5>
              <p class="card-text">+54 9 370 487 824</p>
            </div>
          </div>

        </div>
      </div>

</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
